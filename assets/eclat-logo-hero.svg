<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ECLAT logo hero image</title>
  <desc id="desc">A crisp ECLAT wordmark with a minimal glint mark for the website hero.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="0.62" stop-color="#242424"/>
      <stop offset="1" stop-color="#7fd9ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#dce8e5"/>
      <stop offset="1" stop-color="#ff6645"/>
    </linearGradient>
  </defs>
  <rect x="80" y="90" width="1440" height="820" rx="42" fill="url(#panel)"/>
  <rect x="126" y="136" width="1348" height="728" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="2"/>
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M1230 218v132" stroke-width="10"/>
    <path d="M1164 284h132" stroke-width="10"/>
    <path d="M1184 238l92 92" stroke-width="6" opacity="0.72"/>
    <path d="M1276 238l-92 92" stroke-width="6" opacity="0.72"/>
  </g>
  <text x="50%" y="53%" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="245" font-weight="900">ECLAT</text>
  <rect x="456" y="628" width="688" height="12" rx="6" fill="url(#shine)"/>
  <text x="50%" y="722" text-anchor="middle"
        fill="#ffffff" fill-opacity="0.74" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="34" font-weight="700">DROP 001</text>
</svg>
